[tools]
node = "24.14.0"
"npm:lefthook" = "2.0.13"

[tasks.install]
description = "Install dependencies and set up local development"
run = """
pnpm install
lefthook install
"""

[tasks.build]
description = "Build app and CLI"
run = "pnpm build"

[tasks."publish:local"]
description = "Build and link CLI globally so 'wappy' is available everywhere"
depends = ["build"]
run = "cd packages/cli && npm link"

[tasks.init]
description = "Build and run wappy init to deploy to Cloudflare"
depends = ["build"]
run = 'pnpm wappy -- init "$@"'
