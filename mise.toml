[tools]
node = "24.14.0"
"brew:lefthook" = "2.0.13"

[tasks.install]
description = "Install dependencies and set up local development"
run = """
pnpm install
lefthook install
"""

[tasks.build]
description = "Build app and CLI with worker bundle"
run = "pnpm build"

[tasks."publish:local"]
description = "Build and link CLI globally so 'wapi' is available everywhere"
depends = ["build"]
run = "cd packages/cli && pnpm link --global"

[tasks.init]
description = "Build and run wapi init to deploy to Cloudflare"
depends = ["build"]
run = 'pnpm wapi -- init "$@"'
